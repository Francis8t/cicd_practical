name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

# This workflow will deploy the application to an EC2 instance whenever there is a push to the main branch. It uses the appleboy/ssh-action to SSH into the EC2 instance and execute the deployment commands.
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/cicd_practical
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart gunicorn
