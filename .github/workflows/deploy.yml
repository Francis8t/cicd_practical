name: Deploy Django to EC2

on:
  push:
    branches:
      - main

# This workflow deploys the Django  to an EC2 instance whenever there is a push to the main branch. It uses SSH to connect to the EC2 instance, pulls the latest code, installs dependencies, runs migrations, collects static files, and restarts the Gunicorn service.
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "Navigating to project directory..."
            cd /home/ec2-user/cicd_practical

            echo "Pulling latest code from GitHub..."
            git pull origin main

            echo "Activating virtual environment..."
            source venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt

            echo "Running Django migrations..."
            python manage.py migrate --noinput

            echo "Collecting static files..."
            python manage.py collectstatic --noinput

            echo "Restarting Gunicorn service..."
            sudo systemctl daemon-reload
            sudo systemctl restart gunicorn
            sudo systemctl status gunicorn --no-pager